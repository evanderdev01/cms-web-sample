<div class="add-library-container">
  <div class="modal-header">
    <h5 class="modal-title"><strong>Chi tiết</strong></h5>
    <button type="button" class="close" (click)="close()">
      <span aria-hidden="true" style="color: white">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <ng-container *ngIf="linkLibrary">
      <iframe [src]="linkLibrary | safe" width="100%" height="623px" title="Word Reader"></iframe>
    </ng-container>
  </div>
  <div class="modal-footer justify-content-between">
    <button type="button" class="btn btn-default" (click)="close()">Thoát</button>
  </div>
</div>
