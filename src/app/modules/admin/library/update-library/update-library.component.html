<div class="update-library-container">
  <div class="modal-header">
    <h5 class="modal-title"><strong>Cập nhật người tham gia</strong></h5>
    <button type="button" class="close" (click)="close()">
      <span aria-hidden="true" style="color: white">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <div class="body-inner">
      <label>Nhập Email cách nhau bằng dấu ";"<br>(user1@example.com;user2@example.com)</label>
      <textarea rows="8" [(ngModel)]="mail"></textarea>
    </div>
  </div>
  <div class="modal-footer justify-content-between">
    <button type="button" class="btn btn-default" (click)="close()">Thoát</button>
    <button type="button" class="btn btn-primary" (click)="update()">Cập nhật</button>
  </div>
</div>
