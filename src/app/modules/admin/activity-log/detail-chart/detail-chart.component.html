<div class="chart-detail-container">
  <div class="modal-header">
    <h5 class="modal-title"><strong>{{title}}</strong></h5>
    <button type="button" class="close" (click)="decline()">
      <span aria-hidden="true" style="color: white">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <div class="row">
      <div class="bar-chat col-12" [ngStyle]="{'height': !myChartDetail ? '0px' : ''}">
        <canvas id="myChartDetail"></canvas>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-default" (click)="decline()">Đóng</button>
  </div>
</div>
