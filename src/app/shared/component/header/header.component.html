<nav class="main-header navbar navbar-expand navbar-white navbar-light" id="main-header"
     [ngClass]="theme ? 'theme' : ''"
     [ngStyle]="{'background': theme ? theme['backgroundHeader'] : '', 'color': theme ? theme['colorText'] : ''}">
  <div class="background-theme" *ngIf="theme" [ngStyle]="{'opacity': theme['backgroundOpacity']}">
    <img *ngIf="theme['backgroundUrlHeader']" [src]="theme['backgroundUrlHeader']" alt="CMS">
  </div>
  <!-- Left navbar links -->
  <ul class="navbar-nav ml-auto left-side">
    <li class="nav-item" (click)="toggleMenu()" onKeyDown="">
      <a class="nav-link" [ngStyle]="{'color': theme ? theme['colorText'] : ''}"
         data-widget="pushmenu" href="#" role="button" onKeyDown=""><i class="fas fa-bars"></i></a>
    </li>
    <!-- Notifications Dropdown Menu -->
    <li class="nav-item dropdown">
      <a class="nav-link" [ngStyle]="{'color': theme ? theme['colorText'] : ''}" data-bs-toggle="dropdown" href="#">
        <i class="far fa-bell"></i>
        <span class="badge badge-warning navbar-badge">{{notiList.length}}</span>
      </a>
      <div class="dropdown-menu dropdown-menu-lg dropdown-menu-right">
        <span class="dropdown-item dropdown-header">{{notiList.length}} Notifications</span>
        <ng-container *ngIf="notiList.length > 0">
          <div class="dropdown-divider"></div>
          <div class="dropdown-list">
            <ng-container *ngFor="let n of notiList">
              <a style="cursor: pointer" (click)="navigateRouter(n)" class="dropdown-item">
                <b>{{n.name}}</b>: {{n.id}}
                <span class="float-right text-muted text-sm">{{n.time}}</span>
              </a>
              <div class="dropdown-divider"></div>
            </ng-container>
          </div>
        </ng-container>
      </div>
    </li>
    <li class="nav-item d-none d-sm-inline-block foreword" style="position: relative;" *ngIf="userMail">
      <div class="carousel slide vertical" id="myCarousel" data-bs-ride="carousel">
        <div class="carousel-inner">
          <ng-container *ngFor="let t of textList, let i = index">
            <div class="carousel-item" [ngClass]="i === 0 ? 'active' : ''" data-bs-interval="10000">
              <span>{{t}}</span>
            </div>
          </ng-container>
        </div>
      </div>
    </li>
  </ul>

  <ul class="navbar-nav ml-auto right-side">
    <li class="nav-item dropdown">
      <a class="nav-link avatar" [ngStyle]="{'color': theme ? theme['colorText'] : ''}" data-bs-toggle="dropdown" href="#">
        <div style="height: 28px; width: 28px; display: flex; align-items: center">
          <img [src]=userAva class="img-circle elevation-2" alt="User Image" style="width: 100%; height: 100%">
        </div>
        <div class="name">
          <span>{{userName}}</span>
        </div>
      </a>
      <div class="dropdown-menu dropdown-menu-right">
        <a href="javascript:void(0);" class="dropdown-item" (click)="logout()">
          <i class="fas fa-sign-out-alt mr-2"></i>Logout
        </a>
      </div>
    </li>
    <li class="nav-item">
      <a class="nav-link icon-only" [ngStyle]="{'color': theme ? theme['colorText'] : ''}"
         data-widget="control-sidebar" data-slide="true" href="#" role="button" onKeyDown="">
        <i class="fa-solid fa-table-cells-large"></i>
      </a>
    </li>
  </ul>
</nav>
