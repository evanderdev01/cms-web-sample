<div class="confirmation-dialog-container">
  <div class="modal-header">
    <h5 class="modal-title"><strong>{{ title }}</strong></h5>
    <button type="button" class="close" (click)="decline()">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body" [innerHTML]="message">
  </div>
  <div class="modal-footer justify-content-between">
    <button type="button" class="btn btn-default" (click)="decline()">{{ btnCancelText }}</button>
    <button type="button" class="btn btn-primary" (click)="accept()">{{ btnOkText }}</button>
  </div>
</div>
